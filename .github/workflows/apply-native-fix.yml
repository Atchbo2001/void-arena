name: Apply native custom game fix

on:
  push:
    branches:
      - agent/fix-native-custom-games
    paths:
      - .github/workflows/apply-native-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-native-custom-games
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/native-small.* > /tmp/native-fix.patch.b64
          base64 --decode /tmp/native-fix.patch.b64 > /tmp/native-fix.patch
          echo "eb4498070eb9f6832d54b3153ee6388abf1c98857f620caf7b63c178b26b46b9  /tmp/native-fix.patch" | sha256sum --check --strict
          git apply --check /tmp/native-fix.patch
          git apply /tmp/native-fix.patch

      - name: Format and validate repair
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w pkg/game/protocol/physics.go pkg/game/protocol/pos_test.go
          git diff --check
          if grep -RInE 'ModalBackdrop|ModalCard|createGameOpen|window\.prompt|promptJoin' client/src/index.tsx client/definitions/global.d.ts; then
            echo "Browser overlay or prompt code remains" >&2
            exit 1
          fi
          grep -q 'newgui customgame' client/src/index.tsx
          grep -q 'newgui customgamemaps' client/src/index.tsx
          grep -q 'GetUint()' pkg/game/protocol/physics.go
          go test ./pkg/game/protocol

      - name: Remove temporary staging files
        shell: bash
        run: |
          rm -f .github/native-small.*
          rm -f .github/workflows/apply-native-fix.yml
          rm -f .github/workflows/export-fix-source.yml

      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace custom-game overlay and fix bot packet decoding"
          git push origin HEAD:agent/fix-native-custom-games
