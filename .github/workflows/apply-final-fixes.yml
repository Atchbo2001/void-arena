name: Apply final private game fixes

on:
  push:
    branches:
      - agent/private-games-bots

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    steps:
      - name: Check out work branch
        uses: actions/checkout@v4
        with:
          ref: agent/private-games-bots
          fetch-depth: 0

      - name: Apply reviewed source patch
        run: |
          set -euo pipefail
          cat .github/final-fix.patch.gz.b64.00 .github/final-fix.patch.gz.b64.01 | base64 --decode | gzip -d > /tmp/final.patch
          patch -p1 < /tmp/final.patch
          gofmt -w \
            pkg/gameserver/module.go \
            pkg/gameserver/packet_handling.go \
            pkg/server/ingress/enet.go \
            pkg/server/ingress/ws.go \
            pkg/server/servers/gameserver.go \
            pkg/server/servers/module.go \
            pkg/server/service/commands.go \
            pkg/server/service/events.go \
            pkg/server/service/matchmaking.go \
            pkg/server/service/module.go \
            pkg/server/service/users.go

      - name: Remove temporary recovery files
        run: |
          rm -f .github/private-games.patch.* .github/private-games2.patch.*
          rm -f .github/final-fix.patch.gz.b64.*
          rm -f .github/workflows/export-work-branch.yml
          rm -f .github/workflows/apply-final-fixes.yml

      - name: Commit completed implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finish custom games bots rotation and sync fixes"
          git push origin HEAD:agent/private-games-bots
