server:
  cacheDirectory: "./.cache/assets"
  assets:
    - "fs:assets/dist/.index.source"
  serverDescription: "Void Arena"

  presets:
    - name: "ffa-duel"
      virtual: true
      config:
        defaultMode: "ffa"
        defaultMap: "turbine"
        matchLength: 300
    - name: "insta-duel"
      virtual: true
      config:
        defaultMode: "insta"
        defaultMap: "turbine"
        matchLength: 300
    - name: "default"
      default: true
      config:
        defaultMode: "ffa"
        defaultMap: "complex"
        matchLength: 300
    - name: "ffa"
      config:
        defaultMode: "ffa"
        defaultMap: "complex"
        matchLength: 300
        maps:
          - "turbine"
          - "complex"
          - "dust2"
    - name: "insta"
      config:
        defaultMode: "insta"
        defaultMap: "complex"
        matchLength: 300
        maps:
          - "turbine"
          - "complex"
          - "dust2"
    - name: "insta-dust2"
      config:
        defaultMode: "insta"
        defaultMap: "dust2"
        matchLength: 300
        maps:
          - "dust2"
    - name: "ffa-dust2"
      config:
        defaultMode: "ffa"
        defaultMap: "dust2"
        matchLength: 300
        maps:
          - "dust2"
    - name: "ctf"
      config:
        defaultMode: "ctf"
        defaultMap: "dust2"
        matchLength: 300
        maps:
          - "dust2"
    - name: "effic"
      config:
        defaultMode: "effic"
        defaultMap: "dust2"
        matchLength: 300
        maps:
          - "dust2"
          - "complex"
          - "turbine"

    - name: "ffa-bots"
      config:
        defaultMode: "ffa"
        defaultMap: "complex"
        matchLength: 300
        botCount: 5
        botSkill: 70
        maps:
          - "turbine"
          - "complex"
          - "dust2"
    - name: "insta-bots"
      config:
        defaultMode: "insta"
        defaultMap: "turbine"
        matchLength: 300
        botCount: 4
        botSkill: 78
        maps:
          - "turbine"
          - "complex"
          - "dust2"

  ingress:
    desktop:
      - port: 28785
        target: ffa
        serverInfo:
          enabled: false

  matchmaking:
    duel:
      - name: "ffa"
        preset: "ffa-duel"
        forceRespawn: "dead"
        default: true
      - name: "insta"
        preset: "insta-duel"
        forceRespawn: "dead"

  spaces:
    - preset: "ffa"
      config:
        alias: "ffa"
        description: "Free For All"
    - preset: "insta"
      config:
        alias: "insta"
        description: "Instagib"
    - preset: "insta-dust2"
      config:
        alias: "insta-dust2"
        description: "Instagib Dust 2"
    - preset: "ffa-dust2"
      config:
        alias: "ffa-dust2"
        description: "FFA Dust 2"
    - preset: "ctf"
      config:
        alias: "ctf"
        description: "Capture the Flag"
    - preset: "effic"
      config:
        alias: "effic"
        description: "Efficiency"

    - preset: "ffa-bots"
      config:
        alias: "ffa-bots"
        description: "FFA vs Bots"
    - preset: "insta-bots"
      config:
        alias: "insta-bots"
        description: "Instagib vs Bots"

client:
  assets:
    - "#origin/assets/0/.index.source"
